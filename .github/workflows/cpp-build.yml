name: Repository CI

on:
  push:
  pull_request:

jobs:
  lint-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install clang-format
        run: |
          sudo apt update
          sudo apt install -y clang-format

      - name: Install Ruff
        run: python -m pip install ruff

      - name: Install Node dependencies
        run: npm ci

      - name: Run lint checks
        run: bash ./scripts/lint.sh

  linux-bash:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install g++
        run: |
          sudo apt update
          sudo apt install -y g++

      - name: Install Node dependencies
        run: npm ci

      - name: Verify repository
        run: bash ./scripts/verify-repo.sh

      - name: Multi-language smoke checks
        run: bash ./scripts/smoke-languages.sh

  windows-powershell:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          path-type: inherit
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Add MinGW to PATH
        shell: pwsh
        run: |
          "C:\msys64\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Confirm g++ toolchain
        shell: pwsh
        run: g++ --version

      - name: Install Node dependencies
        shell: pwsh
        run: npm ci

      - name: Verify repository
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts\verify-repo.ps1

      - name: Multi-language smoke checks
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts\smoke-languages.ps1
